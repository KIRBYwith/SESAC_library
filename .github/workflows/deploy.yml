name: CI/CD - Auto Deploy to Lightsail

on:
  push:
    branches: ["develop", "vulnerable"] # develop, vulnerable 브랜치에 push할 때 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ GitHub 리포지토리 코드 가져오기
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2️⃣ Docker 빌드 도구 세팅
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4️⃣ Docker 이미지 빌드 및 push
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./SESAC_Library # 루트에서 SESAC_Library 폴더로 경로 수정
          push: true
          tags: nayawgj/kirby-lib:latest

      # 5️⃣ 서버에 SSH 접속 후 최신 이미지 pull + compose 재시작
      - name: Deploy to Lightsail server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 네트워크 생성 (없으면 생성, 있으면 무시)
            docker network create monitoring-net 2>/dev/null || true

            # Git 저장소에서 최신 코드 받기
            cd ~/SeSAC_Project
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # Spring Boot 스택 배포
            cd ~/SeSAC_Project/SESAC_Library
            docker pull nayawgj/kirby-lib:latest
            docker compose down
            docker compose up -d

            # Monitoring 스택 배포
            cd ~/SeSAC_Project/monitoring
            docker compose down
            docker compose up -d

            # 배포 결과 확인
            echo "=== Container Status ==="
            docker ps
            echo "=== Network Status ==="
            docker network inspect monitoring-net --format '{{range .Containers}}{{.Name}} {{end}}'
