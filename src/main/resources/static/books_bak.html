<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 목록 - 도서관</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef5 0%, #fff8e1 50%, #f3e5f5 100%);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: rgba(255,255,255,0.95);
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 4px 30px rgba(255,192,203,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #d63384;
            font-weight: 600;
        }
        .main-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 0.8rem;
            border-radius: 10px;
            border: 2px solid #ffb3d9;
        }
        .book-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }
        .book-item {
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(255,179,217,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .book-item h3 {
            color: #d63384;
            margin-bottom: 0.5rem;
        }
        .book-item p {
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .book-item button {
            background: linear-gradient(45deg, #ffb3d9, #ffeb99);
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .pagination button {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 2px solid #ffb3d9;
            background: white;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
<header>
    <h1>KIRBY 도서관</h1>
    <nav>
        <a href="index.html">홈</a>
        <a href="books.html">도서목록</a>
        <a href="mypage.html" id="myPageBtn" style="display:none;">마이페이지</a>
        <a href="login.html" id="loginBtn">로그인</a>
        <a href="signup.html" id="signupBtn">회원가입</a>
    </nav>
</header>

<div class="main-container">
    <div class="filters">
        <select id="categoryFilter">
            <option value="">전체 카테고리</option>
            <option value="notice">공지사항</option>
            <option value="review">도서리뷰</option>
            <option value="qna">질문답변</option>
            <option value="free">자유게시판</option>
        </select>
        <input type="text" id="searchInput" placeholder="책 제목 또는 저자 검색">
    </div>

    <div class="book-list" id="bookList"></div>

    <div class="pagination">
        <button id="prevPage">이전</button>
        <span id="pageInfo"></span>
        <button id="nextPage">다음</button>
    </div>
</div>

<script>
    // 로그인 상태 체크
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const myPageBtn = document.getElementById('myPageBtn');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');

    if (isLoggedIn) {
        if (myPageBtn) myPageBtn.style.display = 'inline-block';
        loginBtn.textContent = '로그아웃';
        loginBtn.href = '#';
        loginBtn.addEventListener('click', function(e){
            e.preventDefault();
            localStorage.removeItem('isLoggedIn');
            alert('로그아웃 되었습니다.');
            window.location.reload();
        });
        if (signupBtn) signupBtn.style.display = 'none';
    }

    // 예시 책 데이터
    const books = [
        {id:1, title:"해리포터와 마법사의 돌", author:"J.K. 롤링", category:"review", status:"대출가능"},
        {id:2, title:"반지의 제왕", author:"J.R.R. 톨킨", category:"review", status:"대출중"},
        {id:3, title:"코딩의 정석", author:"홍길동", category:"notice", status:"대출가능"},
        {id:4, title:"자료구조와 알고리즘", author:"홍길동", category:"qna", status:"대출가능"},
        {id:5, title:"자바스크립트 완벽 가이드", author:"홍길동", category:"free", status:"대출중"},
        {id:6, title:"HTML+CSS 정복", author:"홍길동", category:"review", status:"대출가능"},
        {id:7, title:"운영체제 개론", author:"홍길동", category:"notice", status:"대출가능"},
        {id:8, title:"네트워크 기초", author:"홍길동", category:"qna", status:"대출중"},
        {id:9, title:"데이터베이스 입문", author:"홍길동", category:"free", status:"대출가능"},
        {id:10, title:"모의해킹 실습", author:"홍길동", category:"review", status:"대출가능"}
    ];

    let currentPage = 1;
    const itemsPerPage = 4;

    const categoryFilter = document.getElementById('categoryFilter');
    const searchInput = document.getElementById('searchInput');
    const bookList = document.getElementById('bookList');
    const pageInfo = document.getElementById('pageInfo');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');

    function renderBooks() {
        const category = categoryFilter.value;
        const search = searchInput.value.toLowerCase();

        let filtered = books.filter(book => {
            return (category === "" || book.category === category) &&
                (book.title.toLowerCase().includes(search) || book.author.toLowerCase().includes(search));
        });

        const totalPages = Math.ceil(filtered.length / itemsPerPage);
        if(currentPage > totalPages) currentPage = totalPages || 1;

        const start = (currentPage-1)*itemsPerPage;
        const paginatedBooks = filtered.slice(start, start + itemsPerPage);

        bookList.innerHTML = '';
        paginatedBooks.forEach(book => {
            const div = document.createElement('div');
            div.className = 'book-item';
            div.innerHTML = `
                <h3>${book.title}</h3>
                <p>저자: ${book.author}</p>
                <p>카테고리: ${book.category}</p>
                <p>상태: ${book.status}</p>
                <button onclick="alert('${book.title} 선택')">상세보기</button>
            `;
            bookList.appendChild(div);
        });

        pageInfo.textContent = `${currentPage} / ${totalPages || 1}`;
    }

    categoryFilter.addEventListener('change', ()=>{currentPage=1; renderBooks();});
    searchInput.addEventListener('input', ()=>{currentPage=1; renderBooks();});
    prevPage.addEventListener('click', ()=>{if(currentPage>1){currentPage--; renderBooks();}});
    nextPage.addEventListener('click', ()=>{currentPage++; renderBooks();});

    renderBooks();
</script>
</body>
</html>
