spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    show-sql: true # 일부러 켜놓으면 SQL 노출 문제도 시연 가능

    # 파일 업로드 설정 추가
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

# 파일 저장 경로
file:
  upload-dir: ${user.dir}/uploads/board_files

server:
  port: 8080

# 예: logging 레벨도 과도하게 낮춰서 정보 노출 시연
logging:
  file:
    name: /app/logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.sesac_library: DEBUG  # 애플리케이션 코드의 모든 로그
    org.springframework.web: DEBUG     # Spring MVC 요청/응답 로그
    org.springframework.security: DEBUG  # Security 관련 로그 (로그인, 인증)
    org.hibernate.SQL: DEBUG           # SQL 쿼리 로그
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # SQL 파라미터 값
    # org.apache.coyote.http11.Http11Processor: ERROR
    # org.apache.coyote: ERROR
