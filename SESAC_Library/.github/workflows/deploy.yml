name: CI/CD - Auto Deploy to Lightsail

on:
  push:
    branches: [ "develop" ]  # develop 브랜치에 push할 때만 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ GitHub 리포지토리 코드 가져오기
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2️⃣ Docker 빌드 도구 세팅
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3️⃣ Docker Hub 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 4️⃣ Docker 이미지 빌드 및 push
    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: nayawgj/kirby-lib:latest

    # 5️⃣ 서버에 SSH 접속 후 최신 이미지 pull + compose 재시작
    - name: Deploy to Lightsail server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ubuntu
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd ~/kirby-lib
          git pull origin develop
          docker pull nayawgj/kirby-lib:latest
          docker compose down
          docker compose up -d
