version: "3.8"

services:
  app:
    image: nayawgj/kirby-lib:latest
    container_name: kirby-lib-app
    expose:
      - "8080:8080" # nginx가 내부에서 접근할 포트
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    env_file:
      - .env
    volumes:
      - ./logs/app:/logs
      - ./uploads:/app/uploads
    restart: always

  nginx:
    image: nginx:stable
    container_name: kirby-nginx
    ports:
      - "80:80"
      # - "443:443"  # HTTPS 나중에 설정 시 사용
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./logs/nginx:/var/log/nginx
      # - ./certs:/etc/letsencrypt  # HTTPS 시 추가
    depends_on:
      - app
    restart: always
